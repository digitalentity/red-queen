# Red Queen Configuration Example

# Global Settings
log_level: info
concurrency: 10 # Number of simultaneous analysis tasks

# FTP Ingestion Service
ftp:
  listen_address: "0.0.0.0"
  port: 2121
  user: "camera_user"
  password: "secure_password" # Can be overridden by RED_QUEEN_FTP_PASSWORD
  temp_dir: "/tmp/red-queen-uploads"
  retain_files: false # If true, FTP uploads are NOT deleted after processing (useful for debugging)

# Zone Manager: Registration of Cameras by IP
zones:
  - name: "Main Entrance"
    cameras:
      - ip: "192.168.1.10"
      - ip: "192.168.1.11"
  - name: "Back Yard"
    cameras:
      - ip: "192.168.1.20"

# Video Processing & ML Module
ml:
  provider: "gemini-ai" # Options: mock, gemini-ai, always
  # Authentication: See docs/GEMINI_AI.md to set up GOOGLE_APPLICATION_CREDENTIALS.
  model_name: "gemini-1.5-flash"
  project_id: "your-project-id"
  location: "us-central1"
  threshold: 0.85 # Confidence threshold for flagging threats
  target_objects: ["person", "unauthorized vehicle", "weapon", "aggressive behavior"]
  max_artifact_size: 20971520 # Max file size in bytes (e.g., 20MB) to prevent OOM with inline data

# Artifact Storage Module (Permanent)
storage:
  provider: "local" # Options: local, s3, gcs
  local:
    root_path: "/var/lib/red-queen/storage"
  s3:
    bucket: "red-queen-artifacts"
    region: "us-east-1"
    access_key: ""
    secret_key: ""

# Notification Module
notifications:
  - type: "webhook"
    enabled: true
    url: "https://discord.com/api/webhooks/..."
  - type: "homey" # Homey Cloud
    enabled: false
    homey_id: "your-homey-id"
    event: "threat_detected"
  - type: "homey" # Homey Pro Local
    enabled: false
    url: "http://192.168.1.50"
    event: "threat_detected"

# Future: Zone State REST API
api:
  port: 8080
  enabled: true
