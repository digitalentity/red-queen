# Red Queen Configuration Example

# Global Settings
log_level: info
concurrency: 10 # Number of simultaneous analysis tasks

# FTP Ingestion Service
ftp:
  listen_address: "0.0.0.0"
  port: 2121
  user: "camera_user"
  password: "secure_password" # Can be overridden by RED_QUEEN_FTP_PASSWORD
  temp_dir: "/tmp/red-queen-uploads"
  retain_files: false # If true, FTP uploads are NOT deleted after processing (useful for debugging)

# Zone Manager: Registration of Cameras by IP
zones:
  - name: "Main Entrance"
    cameras:
      - ip: "192.168.1.10"
      - ip: "192.168.1.11"
  - name: "Back Yard"
    cameras:
      - ip: "192.168.1.20"

# Video Processing & Detection Pipeline
detection:
  # Optional: fast local pre-filter to reduce cloud costs.
  # If omitted, all uploads go directly to the 'analysis' stage.
  prefilter:
    provider: "yolo-onnx" # Options: mock, yolo-onnx, always
    model_path: "/models/yolov8n.onnx"
    execution_provider: "cpu" # Options: cpu, cuda, tensorrt, coreml
    threshold: 0.50 # YOLO confidence threshold
    target_objects: ["person", "vehicle", "animal"]
    frame_interval: "0.25s" # Sample one frame every 0.25s for video analysis

  # Primary analysis stage (typically cloud-based).
  analysis:
    provider: "gemini-ai" # Options: mock, gemini-ai, always
    # Authentication: Obtain an API Key from Google AI Studio (https://aistudio.google.com/)
    api_key: "YOUR_GEMINI_API_KEY"
    model_name: "gemini-1.5-flash"
    threshold: 0.85 # Gemini confidence threshold
    target_objects: ["person with weapon", "unauthorized intruder"]
    max_artifact_size: 20971520 # Max file size in bytes (20MB)

# Artifact Storage Module (Permanent)
# List one or more providers; artifacts are uploaded to all of them concurrently.
# Supported types: local, google_drive
#
# URL preference: when multiple providers are configured, the URL sent in
# notifications is taken from the first provider (by config order) that
# succeeds. Place the provider whose URL you want recipients to receive first.
# Example: put google_drive before local if you want Drive links in alerts.
storage:
  always_store: false # If true, ALL uploads are retained in storage (regardless of threat status)
  providers:
    - type: local
      local:
        root_path: "/var/lib/red-queen/storage"
    # - type: google_drive
    #   google_drive:
    #     credentials_file: /etc/red-queen/gdrive-sa.json
    #     folder_id: ""  # ID of the Drive folder shared with the service account as Editor

# Notification Module
notifications:
  - type: "webhook"
    enabled: true
    condition: "always" # Options: on_threat (default), always
    url: "https://discord.com/api/webhooks/..."
  - type: "homey" # Homey Cloud
    enabled: false
    condition: "on_threat"
    homey_id: "your-homey-id"
    event: "threat_detected"
  - type: "homey" # Homey Pro Local
    enabled: false
    url: "http://192.168.1.50"
    event: "threat_detected"
  - type: "telegram"
    enabled: false
    token: "BOT_TOKEN"
    chat_id: 123456789
    artifact_base_url: "https://your-public-url.com/artifacts"

# Future: Zone State REST API
api:
  port: 8080
  enabled: true
